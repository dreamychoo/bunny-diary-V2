<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小兔日记 — 3D Emoji App 效果图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8f2;
  --card:#fffdf9;
  --ink:#241b18;
  --muted:#9b8f87;
  --soft:#d9cdc5;
  --pink:#ff6f86;
  --pink-2:#ff8fa0;
  --pink-soft:#fff0f2;
  --peach:#fff4e8;
  --green:#77bf88;
  --shadow:0 10px 30px rgba(150,105,93,.10), 0 2px 8px rgba(150,105,93,.05);
  --shadow-soft:0 6px 20px rgba(150,105,93,.08);
}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:32px;
  background:linear-gradient(135deg,#f3eee8,#eee7df);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Noto Sans SC",sans-serif;
  color:var(--ink);
}
.stage{display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.phone{
  width:390px;
  height:844px;
  border-radius:42px;
  padding:10px;
  background:#111;
  box-shadow:0 30px 80px rgba(48,31,25,.28);
}
.screen{
  position:relative;
  width:100%;height:100%;
  overflow:hidden;
  border-radius:34px;
  background:
    radial-gradient(circle at 10% 4%,rgba(255,209,180,.35),transparent 38%),
    radial-gradient(circle at 98% 35%,rgba(255,185,200,.22),transparent 35%),
    var(--bg);
}
.status{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:13px;font-weight:700;color:#19120f}
.icons{font-size:12px;letter-spacing:-2px}
.header{display:flex;align-items:center;justify-content:space-between;padding:4px 22px 10px}
.title{font-size:30px;font-weight:800;letter-spacing:-.04em;line-height:1}
.heart{color:var(--pink);font-size:22px;margin-left:4px;vertical-align:2px}
.settings{
  width:42px;height:42px;border:0;border-radius:15px;
  background:rgba(255,255,255,.74);
  color:var(--pink);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(16px);
  font-size:21px;
}
.main{padding:4px 20px 94px}
.hero{
  position:relative;
  min-height:178px;
  border-radius:30px;
  background:rgba(255,253,249,.78);
  box-shadow:var(--shadow);
  backdrop-filter:blur(20px);
  padding:24px 148px 22px 22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.76);
}
.hero::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(255,255,255,.35));
  pointer-events:none;
}
.hero-copy{position:relative;z-index:2}
.hero h2{font-size:22px;line-height:1.15;font-weight:800;letter-spacing:-.03em;margin-bottom:7px}
.hero p{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:18px}
.cta{
  border:0;border-radius:999px;padding:12px 19px;
  background:linear-gradient(180deg,var(--pink-2),var(--pink));
  color:white;font-size:14px;font-weight:800;
  box-shadow:0 8px 20px rgba(255,111,134,.30), inset 0 1px rgba(255,255,255,.35);
}
.bunny-hero{
  position:absolute;right:-8px;bottom:-4px;width:168px;height:168px;object-fit:contain;z-index:2;
  filter:drop-shadow(0 14px 20px rgba(129,74,64,.17));
}
.mug{position:absolute;right:112px;bottom:22px;width:42px;z-index:3;filter:drop-shadow(0 7px 9px rgba(129,74,64,.16))}
.spark{position:absolute;color:#ffb5c1;font-weight:900;z-index:3}.s1{right:28px;top:24px;font-size:19px}.s2{right:116px;top:35px;font-size:12px}.s3{right:94px;bottom:80px;font-size:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.feature{
  position:relative;
  min-height:118px;
  border:0;border-radius:25px;
  background:rgba(255,253,249,.82);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(18px);
  padding:17px 15px;
  text-align:left;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.7);
}
.feature h3{font-size:16px;letter-spacing:-.02em;margin-bottom:4px;font-weight:800;position:relative;z-index:2}
.feature p{font-size:12px;color:var(--muted);font-weight:650;position:relative;z-index:2}
.feat-img{position:absolute;right:8px;bottom:7px;width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 8px 12px rgba(129,74,64,.13));}
.arrow{position:absolute;right:14px;top:15px;color:var(--pink);font-size:19px;font-weight:800}
.rabbit-small{width:70px!important;height:70px!important;right:5px!important;bottom:4px!important}
.say{
  position:relative;margin-top:16px;border-radius:26px;background:rgba(255,253,249,.82);
  box-shadow:var(--shadow-soft);backdrop-filter:blur(18px);padding:16px 98px 16px 18px;min-height:92px;border:1px solid rgba(255,255,255,.7);overflow:hidden;
}
.pill{display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:999px;background:var(--pink-soft);color:var(--pink);font-size:11px;font-weight:800;margin-bottom:8px}
.quote{font-size:15px;font-weight:800;line-height:1.35;letter-spacing:-.02em}
.sleep-bunny{position:absolute;right:12px;bottom:4px;width:86px;filter:drop-shadow(0 8px 12px rgba(129,74,64,.13))}
.zzz{position:absolute;right:55px;top:12px;color:#ff9aaa;font-weight:900;font-size:15px;transform:rotate(-12deg)}
.tabbar{
  position:absolute;left:16px;right:16px;bottom:16px;height:72px;border-radius:26px;
  background:rgba(255,253,249,.78);box-shadow:0 12px 32px rgba(106,70,62,.13);backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.72);
  display:grid;grid-template-columns:repeat(4,1fr);align-items:center;padding:8px 8px;
}
.tab{height:56px;border-radius:19px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#9e928b;font-size:10px;font-weight:800}
.tab svg{width:21px;height:21px;stroke-width:2.4}
.tab.active{background:var(--pink-soft);color:var(--pink)}
.notes{width:390px;background:rgba(255,255,255,.72);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:22px;box-shadow:var(--shadow);color:#4d403a}
.notes h2{font-size:20px;margin-bottom:10px}.notes p{font-size:14px;line-height:1.7;color:#6f625b}.notes code{background:#fff2f4;color:#d94f66;padding:2px 6px;border-radius:8px}
</style>
</head>
<body>
<div class="stage">
  <div class="phone">
    <div class="screen">
      <div class="status"><span>9:41</span><span class="icons">●●●  ◔  ▰</span></div>
      <div class="header">
        <div class="title">小兔日记<span class="heart">♥</span></div>
        <button class="settings">⚙︎</button>
      </div>
      <main class="main">
        <section class="hero">
          <span class="spark s1">✦</span><span class="spark s2">✦</span><span class="spark s3">✧</span>
          <div class="hero-copy">
            <h2>今天想留下些什么？</h2>
            <p>写一小段也可以</p>
            <button class="cta">开始记录</button>
          </div>
          <img class="mug" src="public/assets/v2/items/heart-mug.png" alt="">
          <img class="bunny-hero" src="public/assets/v2/rabbits/reading.png" alt="读书的小兔">
        </section>

        <section class="grid">
          <button class="feature">
            <span class="arrow">›</span>
            <h3>整理心事</h3><p>慢慢说</p>
            <img class="feat-img" src="public/assets/v2/items/sticky-note.png" alt="">
          </button>
          <button class="feature">
            <span class="arrow">›</span>
            <h3>花园</h3><p>看看今天长出了什么</p>
            <img class="feat-img" src="public/assets/v2/plants/sprout.png" alt="">
          </button>
          <button class="feature">
            <span class="arrow">›</span>
            <h3>小兔信箱</h3><p>1封未读</p>
            <img class="feat-img" src="public/assets/v2/items/heart-envelope.png" alt="">
          </button>
          <button class="feature">
            <span class="arrow">›</span>
            <h3>回忆册</h3><p>最近记录</p>
            <img class="feat-img" src="public/assets/v2/items/photo-album.png" alt="">
          </button>
        </section>

        <section class="say">
          <div class="pill">小兔说</div>
          <div class="quote">情绪不是问题，<br>它只是信息。</div>
          <div class="zzz">Zzz</div>
          <img class="sleep-bunny" src="public/assets/v2/rabbits/sleeping.png" alt="睡觉的小兔">
        </section>
      </main>

      <nav class="tabbar">
        <div class="tab active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg><span>首页</span>
        </div>
        <div class="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21V9"/><path d="M12 9C9 5 5 5 3 8c3 0 6 2 9 6"/><path d="M12 9c3-4 7-4 9-1-3 0-6 2-9 6"/></svg><span>花园</span>
        </div>
        <div class="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6-5.4-2.9-5.4 2.9 1-6-4.4-4.3 6.1-.9z"/></svg><span>收藏室</span>
        </div>
        <div class="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="4" width="14" height="16" rx="3"/><path d="M9 8h6M9 12h6M9 16h4"/></svg><span>回忆册</span>
        </div>
      </nav>
    </div>
  </div>

  <aside class="notes">
    <h2>这一版更贴近你的参考图</h2>
    <p>关键词：<code>奶油白背景</code>、<code>3D兔兔素材</code>、<code>粉色主按钮</code>、<code>柔软白卡片</code>、<code>毛玻璃底部导航</code>。</p>
    <p style="margin-top:10px">我用了项目现有的 <code>public/assets/v2/rabbits</code> 和 <code>items/plants</code> 素材，所以这版可以比较顺滑地落到 React 项目里。</p>
  </aside>
</div>
</body>
</html>
