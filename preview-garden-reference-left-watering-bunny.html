<style>

body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#efe7de,#f5eee6);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",system-ui,sans-serif;color:var(--ink);padding:28px}.phone{width:390px;height:844px;border-radius:42px;background:#111;padding:10px;box-shadow:0 30px 80px rgba(45,30,22,.28)}.screen{position:relative;width:100%;height:100%;overflow:hidden;border-radius:34px;background:radial-gradient(circle at 12% 4%,rgba(255,217,183,.36),transparent 42%),radial-gradient(circle at 88% 28%,rgba(194,229,180,.22),transparent 38%),var(--bg)}.status{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:13px;font-weight:750;color:#201712}.icons{letter-spacing:-2px}.content{position:relative;padding:0 20px 98px}.top{position:relative;min-height:142px;padding-top:4px}.watering-bunny{position:absolute;left:-10px;top:2px;width:132px;height:132px;object-fit:contain;filter:drop-shadow(0 14px 18px rgba(95,64,48,.16));z-index:2}.title-block{padding-left:108px;padding-top:14px}.title{font-size:29px;font-weight:900;letter-spacing:-.045em;line-height:1}.heart{color:var(--pink);font-size:20px;margin-left:4px}.subtitle{margin-top:8px;font-size:12px;line-height:1.55;font-weight:650;color:var(--muted);max-width:218px}.settings{position:absolute;right:0;top:12px;width:42px;height:42px;border-radius:15px;border:1px solid rgba(232,214,202,.72);background:rgba(255,255,255,.75);box-shadow:var(--shadow);color:var(--green);font-size:20px}.leaf{position:absolute;color:#8dcf8e;font-weight:900}.leaf.l1{right:68px;top:24px;transform:rotate(-20deg)}.leaf.l2{right:28px;top:68px;color:#fff;background:#e7c66b;border-radius:999px;width:12px;height:12px}.prompt{display:flex;align-items:center;gap:12px;margin-top:-4px;padding:14px;border-radius:22px;background:rgba(255,254,250,.86);border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.sprout-icon{width:48px;height bsolute;width:10px;height:7px;border-radius:999px;background:#e9e4d9;box-shadow:inset 0 1px rgba(255,255,255,.6);z-index:3}.mini-grass{position:absolute;width:22px;height:16px;z-index:3}.mini-grass:before,.mini-grass:after{content:"";position:absolute;bottom:0;width:8px;height:15px;border-radius:9px 9px 0 0;background:#4ea75f}.mini-grass:before{left:3px;transform:rotate(-18deg)}.mini-grass:after{right:3px;transform:rotate(18deg)}.p1{left:42px;top:76px;width:98px}.p2{left:152px;top:48px;width:72px}.p3{right:46px;top:62px;width:78px}.p4{left:70px;bottom:62px;width:60px}.p5{right:62px;bottom:54px;width:86px}.plot.a{left:48px;top:170px}.plot.b{left:160px;bottom:70px}.plot.c{right:36px;top:170px}.letter-card{display:flex;align-items:center;gap:12px;margin-top:12px;padding:14px;border-radius:22px;background:rgba(255,254,250,.88);border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow)}.letter-card img{width:48px;height:48px;object-fit:contain}.letter-card div{flex:1}.letter-card h3{font-size:16px;font-weight:900}.letter-card p{margin-top:3px;font-size:11px;line-height:1.35;color:var(--muted);font-weight:650}.chev{font-size:24px;color:#8b786d}.tabbar{position:absolute;left:16px;right:16px;bottom:16px;height:72px;border-radius:26px;background:rgba(255,254,250,.84);box-shadow:0 12px 32px rgba(106,70,62,.13);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.75);display:grid;grid-template-columns:repeat(4,1fr);padding:8px}.tab{height:56px;border-radius:19px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#9e928b;font-size:10px;font-weight:850}.tab.active{background:var(--greenSoft);color:var(--green)}.tab i{font-style:normal;font-size:20px}.home-ind{position:absolute;left:50%;bottom:5px;transform:translateX(-50%);width:126px;height:5px;border-radius:99px;background:#111}.note{margin-top:18px;width:390px;color:#6f625b;font-size:13px;line-height:1.7;text-align:center}.stage{display:grid;gap:18px;justify-items:center}
