<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小兔说 · 新手机壳复古分享图 V3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --lcd-x:72px;
  --lcd-y:155px;
  --lcd-w:216px;
  --lcd-h:270px;
  --font-size:17px;
  --lcd-ink:#243020;
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:28px;
  padding:28px;
  background:radial-gradient(circle at 18% 12%,rgba(255,212,225,.65),transparent 34%),radial-gradient(circle at 82% 78%,rgba(207,226,177,.55),transparent 35%),#f7f2ed;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",system-ui,sans-serif;
  color:#2d211d;
}
.phone-stage{width:360px;position:relative;filter:drop-shadow(0 26px 56px rgba(69,45,38,.23))}.capture{position:relative;width:360px;height:726px}.phone-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:1;pointer-events:none}.lcd-text{position:absolute;left:var(--lcd-x);top:var(--lcd-y);width:var(--lcd-w);height:var(--lcd-h);z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px 14px 24px;color:var(--lcd-ink);font-family:"Courier New",Menlo,Consolas,ui-monospace,monospace;image-rendering:pixelated;transform:rotate(-.25deg);overflow:hidden}.lcd-text.calibrate{outline:2px dashed rgba(255,0,95,.72);background:rgba(198,226,177,.22)}.lcd-title{position:absolute;top:10px;left:0;right:0;text-align:center;font-size:10px;font-weight:900;letter-spacing:.12em;opacity:.72;outline:none}.divider{position:absolute;top:32px;left:0;right:0;text-align:center;font-size:9px;opacity:.72;outline:none}.quote{width:100%;min-height:122px;border:0;outline:0;resize:none;background:transparent;text-align:center;color:var(--lcd-ink);font-family:"Courier New",Menlo,Consolas,ui-monospace,monospace;font-size:var(--font-size);line-height:1.58;font-weight:900;letter-spacing:.02em;text-shadow:1px 0 rgba(35,48,33,.20);overflow:hidden}.footer{position:absolute;left:13px;right:13px;bottom:10px;display:flex;justify-content:space-between;font-size:9px;font-weight:900;opacity:.75}.footer span{outline:none}.panel{width:min(390px,100%);border-radius:28px;padding:22px;background:rgba(255,255,255,.78);backdrop-filter:blur(18px);box-shadow:0 20px 60px rgba(91,68,60,.13)}.panel h1{font-size:21px;letter-spacing:-.03em;margin-bottom:8px}.panel p{font-size:13px;line-height:1.7;color:#746862}.samples{display:grid;gap:9px;margin-top:15px}.sample{border:0;border-radius:16px;background:#fff8f3;text-align:left;padding:11px 12px;font-size:13px;line-height:1.5;color:#4b3a34;font-weight:750;cursor:pointer}.sample:hover{background:#ffeef4}.btn{width:100%;margin-top:11px;border:0;border-radius:15px;background:#f1adc3;color:white;font-weight:900;padding:12px;cursor:pointer}.btn.secondary{background:#eee3db;color:#6e5f57}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.ctrl{background:#fbf3ee;border-radius:14px;padding:9px}.ctrl label{display:block;font-size:11px;font-weight:850;color:#6f625b;margin-bottom:6px}.ctrl input{width:100%}.hint{margin-top:10px;font-size:11px;color:#9a8d84;line-height:1.6}@media(max-width:860px){body{flex-direction:column;padding:16px}.panel{width:360px}.phone-stage,.capture{width:360px}}
</style>
</head>
<body>
  <div class="phone-stage">
    <div class="capture" id="capture">
      <img class="phone-img" src="preview-assets/share-phone-v3/phone-shell-360.png" alt="新手机壳">
      <div class="lcd-text calibrate" id="lcd">
        <div class="lcd-title" contenteditable="true">BUNNY DIARY</div>
        <div class="divider" contenteditable="true">⋯⋯ ᕱ⑅ᕱ ⋯⋯</div>
        <textarea class="quote" id="quote">情绪上来时，
先停三秒，
比立刻反应更有力量。</textarea>
        <div class="footer"><span id="date"></span><span contenteditable="true">SAVE</span></div>
      </div>
    </div>
  </div>

  <aside class="panel">
    <h1>新手机壳 V3</h1>
    <p>已经换成你刚发的这张新手机图。粉色虚线是屏幕文字校准框；确认位置后隐藏校准框，再导出 PNG。</p>
    <div class="samples">
      <button class="sample">情绪上来时，\n先停三秒，\n比立刻反应更有力量。</button>
      <button class="sample">被理解很幸运。\n没被理解，\n也不代表自己说错了。</button>
      <button class="sample">有些频道需要调很久，\n才会听见彼此的声音。</button>
      <button class="sample">今天不用急着变好，\n愿意照顾自己，\n就已经很好。</button>
    </div>
    <button class="btn" onclick="toggleCalibrate()">显示/隐藏校准框</button>
    <button class="btn secondary" onclick="exportImg()">生成分享图 PNG</button>
    <div class="controls">
      <div class="ctrl"><label>X 位置</label><input type="range" min="20" max="160" value="72" data-var="--lcd-x" data-unit="px"></div>
      <div class="ctrl"><label>Y 位置</label><input type="range" min="60" max="360" value="155" data-var="--lcd-y" data-unit="px"></div>
      <div class="ctrl"><label>宽度</label><input type="range" min="120" max="300" value="216" data-var="--lcd-w" data-unit="px"></div>
      <div class="ctrl"><label>高度</label><input type="range" min="100" max="360" value="270" data-var="--lcd-h" data-unit="px"></div>
      <div class="ctrl"><label>字号</label><input type="range" min="11" max="24" value="17" data-var="--font-size" data-unit="px"></div>
    </div>
    <div class="hint">如果文字不在屏幕里，拖动滑杆即可。导出时会自动隐藏校准框。</div>
  </aside>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
document.getElementById('date').innerText = new Date().toISOString().slice(0,10);
const quote = document.getElementById('quote');
document.querySelectorAll('.sample').forEach(btn=>btn.onclick=()=>{quote.value=btn.textContent.replaceAll('\\n','\n')});
document.querySelectorAll('input[type="range"]').forEach(input=>{input.oninput=()=>document.documentElement.style.setProperty(input.dataset.var, input.value + input.dataset.unit)});
function toggleCalibrate(){document.getElementById('lcd').classList.toggle('calibrate')}
function exportImg(){const lcd=document.getElementById('lcd');const was=lcd.classList.contains('calibrate');lcd.classList.remove('calibrate');html2canvas(document.querySelector('#capture'),{scale:3,backgroundColor:null,useCORS:true}).then(canvas=>{if(was)lcd.classList.add('calibrate');const a=document.createElement('a');a.download='bunny-retro-phone-v3.png';a.href=canvas.toDataURL('image/png');a.click();});}
</script>
</body>
</html>
