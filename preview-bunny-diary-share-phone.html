<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小兔说 · 手机壳分享图工具</title>
<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:28px;
  background:
    radial-gradient(circle at 18% 12%, rgba(255,213,224,.55), transparent 34%),
    radial-gradient(circle at 84% 72%, rgba(207,227,177,.46), transparent 36%),
    #f6f2ee;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC",system-ui,sans-serif;
  color:#312522;
  padding:28px;
}

/* 手机外壳 */
.phone{
  width:340px;
  background:linear-gradient(180deg,#f7bed0,#ee9eb8);
  border-radius:34px;
  padding:18px;
  box-shadow:
    0 28px 70px rgba(118,70,83,.26),
    inset 0 2px 0 rgba(255,255,255,.45),
    inset 0 -8px 18px rgba(181,76,108,.12);
  position:relative;
}

.phone::before{
  content:"";
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  width:68px;
  height:7px;
  border-radius:999px;
  background:rgba(255,255,255,.35);
}

/* LCD屏幕 */
.screen{
  background:
    linear-gradient(180deg,rgba(255,255,255,.18),transparent 38%),
    #cfe3b1;
  border-radius:20px;
  padding:14px;
  height:430px;
  font-family:"SF Mono",Menlo,Consolas,"Courier New",monospace;
  color:#1f2a1f;
  box-shadow:
    inset 0 3px 10px rgba(60,85,45,.15),
    inset 0 -2px 0 rgba(255,255,255,.30);
  border:2px solid rgba(125,91,104,.13);
  overflow:hidden;
}

/* 顶部状态栏 */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  opacity:.75;
  letter-spacing:.02em;
}

/* 标题 */
.title{
  text-align:center;
  margin-top:8px;
  font-size:15px;
  font-weight:700;
  outline:none;
}

/* 兔子分隔线 */
.divider{
  text-align:center;
  margin:10px 0;
  font-size:12px;
  outline:none;
  opacity:.82;
}

/* 内容编辑区 */
textarea{
  width:100%;
  height:250px;
  background:transparent;
  border:none;
  outline:none;
  resize:none;
  font-family:"SF Mono",Menlo,Consolas,"Courier New",monospace;
  font-size:14px;
  line-height:1.68;
  color:#1f2a1f;
  padding:3px 2px;
}

textarea::selection,
[contenteditable="true"]::selection{
  background:rgba(255,255,255,.45);
}

/* 底部 */
.footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  margin-top:8px;
  opacity:.82;
}

.footer span{
  outline:none;
}

/* 按钮 */
.btn{
  margin-top:12px;
  width:100%;
  padding:11px;
  border:none;
  border-radius:14px;
  background:#fff;
  cursor:pointer;
  font-weight:700;
  color:#6e4b58;
  box-shadow:0 8px 18px rgba(118,70,83,.12);
}

.btn:hover{
  transform:translateY(-1px);
}

.hint{
  text-align:center;
  font-size:11px;
  opacity:.62;
  margin-top:7px;
}

.panel{
  width:min(360px,100%);
  border-radius:28px;
  background:rgba(255,255,255,.72);
  box-shadow:0 20px 56px rgba(94,70,60,.13);
  padding:20px;
  backdrop-filter:blur(18px);
}

.panel h1{
  margin:0 0 8px;
  font-size:20px;
  letter-spacing:-.03em;
}

.panel p{
  margin:0;
  font-size:13px;
  line-height:1.7;
  color:#746862;
}

.samples{
  display:grid;
  gap:10px;
  margin-top:16px;
}

.sample{
  border:none;
  border-radius:16px;
  background:#fff8f4;
  text-align:left;
  padding:12px 13px;
  color:#4b3a34;
  font-size:13px;
  line-height:1.55;
  cursor:pointer;
}

.sample:hover{
  background:#ffeef3;
}

.row{
  display:flex;
  gap:8px;
  margin-top:14px;
}

.small-btn{
  flex:1;
  border:none;
  border-radius:14px;
  background:#f1e8e0;
  color:#6c5d55;
  padding:10px;
  font-weight:700;
  cursor:pointer;
}

.small-btn.active{
  background:#f3b6c7;
  color:#fff;
}

@media(max-width:820px){
  body{
    flex-direction:column;
    padding:18px;
  }
}
</style>
</head>

<body>

<div class="phone">
  <div class="screen" id="capture">
    <!-- 状态栏 -->
    <div class="topbar">
      <span id="time">11:11</span>
      <span>📶 🔋</span>
    </div>

    <!-- 标题（可编辑） -->
    <div class="title" contenteditable="true">小兔说</div>

    <!-- 兔子分割线（可编辑） -->
    <div class="divider" contenteditable="true">⋯⋯ 🐰 ⋯⋯</div>

    <!-- 内容 -->
    <textarea id="content">情绪上来时，先停三秒，
比立刻反应更有力量。</textarea>

    <!-- 底部 -->
    <div class="footer">
      <span id="date"></span>
      <span contenteditable="true">保存</span>
    </div>
  </div>

  <button class="btn" onclick="exportImg()">生成分享图</button>
  <div class="hint">点击可编辑 · 一键生成分享图</div>
</div>

<aside class="panel">
  <h1>小兔说分享图壳子</h1>
  <p>这个版本就是你说的手机样式外壳：粉色机身、绿色 LCD 屏幕，中间文字可替换。适合从“小兔说”跳转进来后，把句子生成分享图。</p>

  <div class="samples">
    <button class="sample">情绪上来时，先停三秒，\n比立刻反应更有力量。</button>
    <button class="sample">被理解很幸运。\n没被理解，也不代表自己说错了。\n\n有些频道需要调很久，\n才会听见彼此的声音。</button>
    <button class="sample">今天不用急着变好。\n愿意停下来照顾自己，\n就已经很厉害了。</button>
    <button class="sample">有些心情不是要立刻解决，\n它只是想被你看见一下。</button>
  </div>

  <div class="row">
    <button class="small-btn active" onclick="setTheme('pink')">粉色壳</button>
    <button class="small-btn" onclick="setTheme('cream')">奶油壳</button>
  </div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const date = new Date();
document.getElementById("date").innerText = date.toISOString().slice(0,10);

const content = document.getElementById("content");
document.querySelectorAll(".sample").forEach(btn=>{
  btn.addEventListener("click",()=>{
    content.value = btn.textContent.replaceAll("\\n", "\n");
  });
});

function exportImg(){
  html2canvas(document.querySelector("#capture"), {
    scale: 3,
    backgroundColor: null
  }).then(canvas=>{
    let a = document.createElement("a");
    a.download = "bunny-diary-share.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });
}

function setTheme(theme){
  const phone = document.querySelector('.phone');
  document.querySelectorAll('.small-btn').forEach(b=>b.classList.remove('active'));
  if(theme === 'cream'){
    phone.style.background = 'linear-gradient(180deg,#fff2df,#f1d4b8)';
    event.target.classList.add('active');
  }else{
    phone.style.background = 'linear-gradient(180deg,#f7bed0,#ee9eb8)';
    event.target.classList.add('active');
  }
}
</script>

</body>
</html>
