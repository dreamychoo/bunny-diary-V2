<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小兔说 · 日记卡片样式预览</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f6eee6;--cream:#fff8ef;--card:#fffdf8;--ink:#2b211d;--muted:#9b8d83;--pink:#ff7188;--pink2:#ff91a2;--green:#75bd85;--shadow:0 18px 50px rgba(125,84,70,.14),0 4px 16px rgba(125,84,70,.07)}
body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#efe7de,#f7efe7);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",system-ui,sans-serif;color:var(--ink);padding:28px}.stage{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;justify-content:center}.phone{width:390px;height:844px;border-radius:42px;background:#111;padding:10px;box-shadow:0 30px 80px rgba(45,30,22,.28)}.screen{position:relative;width:100%;height:100%;overflow:hidden;border-radius:34px;background:radial-gradient(circle at 16% 4%,rgba(255,218,185,.42),transparent 43%),radial-gradient(circle at 92% 34%,rgba(255,184,200,.22),transparent 38%),#fdf8f1}.status{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:13px;font-weight:760}.top{display:flex;align-items:center;justify-content:space-between;padding:4px 22px 12px}.title{font-size:29px;font-weight:900;letter-spacing:-.045em}.heart{color:var(--pink);font-size:20px;margin-left:4px}.iconbtn{width:42px;height:42px;border-radius:15px;border:1px solid rgba(230,214,204,.7);background:rgba(255,255,255,.76);box-shadow:0 6px 20px rgba(151,105,92,.08);color:var(--pink);font-size:20px}.content{padding:0 20px 98px}.hero{position:relative;min-height:136px;border-radius:28px;background:rgba(255,254,250,.86);border:1px solid rgba(255,255,255,.82);box-shadow:var(--shadow);padding:21px 130px 20px 20px;overflow:hidden}.hero h2{font-size:20px;font-weight:900;letter-spacing:-.03em}.hero p{margin-top:7px;color:var(--muted);font-size:12px;font-weight:650}.hero img{position:absolute;right:2px;bottom:-8px;width:132px;filter:drop-shadow(0 13px 18px rgba(129,74,64,.16))}.tabs{display:flex;gap:8px;margin:16px 0 12px}.tab{height:34px;border:0;border-radius:999px;padding:0 13px;background:#fff;color:#8b7b72;font-size:12px;font-weight:850;box-shadow:0 4px 14px rgba(125,84,70,.06)}.tab.active{background:var(--pink);color:white}.quote-wrap{position:relative;height:422px;border-radius:34px;background:linear-gradient(180deg,#fffdf8,#fff6eb);box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(255,255,255,.82)}.quote-wrap:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 16%,rgba(255,155,170,.18),transparent 34%),radial-gradient(circle at 20% 88%,rgba(126,197,137,.13),transparent 34%);pointer-events:none}.quote-card{position:absolute;inset:18px;border-radius:28px;background:rgba(255,255,255,.36);border:1px solid rgba(255,255,255,.6);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;text-align:center;padding:44px 34px 64px}.quote{font-size:26px;line-height:1.58;font-weight:900;letter-spacing:-.035em;color:#33241f;text-wrap:balance}.quote-mark{position:absolute;left:26px;top:18px;font-size:62px;line-height:1;color:rgba(255,113,136,.20);font-family:Georgia,serif}.date{position:absolute;left:28px;bottom:25px;color:#8f8077;font-size:12px;font-weight:800;letter-spacing:.02em}.brand{position:absolute;right:28px;bottom:25px;display:inline-flex;align-items:center;gap:6px;color:var(--pink);font-size:12px;font-weight:900}.brand img{width:22px;height:22px;object-fit:contain}.deco-bunny{position:absolute;right:18px;top:14px;width:70px;filter:drop-shadow(0 9px 12px rgba(129,74,64,.13));opacity:.95}.style-note{margin-top:14px;border-radius:24px;background:rgba(255,254,250,.84);box-shadow:0 8px 24px rgba(125,84,70,.08);padding:15px 16px}.style-note b{font-size:15px}.style-note p{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.55;font-weight:650}.tabbar{position:absolute;left:16px;right:16px;bottom:16px;height:72px;border-radius:26px;background:rgba(255,254,250,.84);box-shadow:0 12px 32px rgba(106,70,62,.13);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.75);display:grid;grid-template-columns:repeat(4,1fr);padding:8px}.nav{height:56px;border-radius:19px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#9e928b;font-size:10px;font-weight:850}.nav.active{background:#fff0f2;color:var(--pink)}.nav i{font-style:normal;font-size:20px}.home-ind{position:absolute;left:50%;bottom:5px;transform:translateX(-50%);width:126px;height:5px;border-radius:99px;background:#111}.controls{width:360px;border-radius:28px;background:rgba(255,255,255,.74);box-shadow:var(--shadow);padding:22px}.controls h1{font-size:22px;margin-bottom:8px}.controls p{color:#6d5f57;font-size:14px;line-height:1.7}.sample-list{display:grid;gap:10px;margin-top:16px}.sample{border:0;border-radius:18px;background:#fff8f2;text-align:left;padding:12px 13px;color:#3a2b25;font-size:13px;line-height:1.5;font-weight:750}.sample:hover{background:#fff0f2}.alt .quote-wrap{background:linear-gradient(180deg,#2a211f,#4b332d);color:#fff}.alt .quote-card{background:rgba(255,248,238,.10);border-color:rgba(255,255,255,.18)}.alt .quote{color:#fff8ef}.alt .date{color:rgba(255,248,238,.72)}.alt .brand{color:#ffb1bd}.alt .quote-mark{color:rgba(255,255,255,.13)}@media(max-width:850px){.controls{width:390px;max-width:100%}body{padding:16px}}
</style>
</head>
<body>
<div class="stage">
  <div class="phone">
    <div class="screen" id="screen">
      <div class="status"><span>9:41</span><span>●●● ◔ ▰</span></div>
      <div class="top"><div class="title">小兔说<span class="heart">♥</span></div><button class="iconbtn">•••</button></div>
      <main class="content">
        <section class="hero"><h2>今天留下一句话</h2><p>从小兔说跳转进来的句子，可以变成一张日记卡片。</p><img src="public/assets/v2/rabbits/reading.png" alt=""></section>
        <div class="tabs"><button class="tab active" id="softBtn">奶油卡片</button><button class="tab" id="darkBtn">夜间卡片</button></div>
        <section class="quote-wrap">
          <img class="deco-bunny" src="public/assets/v2/rabbits/sitting.png" alt="">
          <span class="quote-mark">“</span>
          <div class="quote-card"><p class="quote" id="quoteText">情绪上来时，<br>先停三秒，<br>比立刻反应更有力量。</p></div>
          <div class="date" id="dateText">2026年7月4日</div>
          <div class="brand"><img src="public/assets/v2/items/pink-heart.png" alt="">小兔说</div>
        </section>
        <section class="style-note"><b>日记卡片样式</b><p>文字居中，日期固定在左下角；适合从“小兔说”跳转生成一张可保存/分享的日记图。</p></section>
      </main>
      <nav class="tabbar"><div class="nav"><i>⌂</i>首页</div><div class="nav"><i>♧</i>花园</div><div class="nav active"><i>♥</i>小兔说</div><div class="nav"><i>▣</i>回忆册</div></nav>
      <div class="home-ind"></div>
    </div>
  </div>
  <aside class="controls"><h1>小兔说 · 日记卡片 HTML 预览</h1><p>点击下面的句子可以替换到手机卡片里。后续如果接入项目，入口可以是「小兔说」列表 → 生成这张日记卡。</p><div class="sample-list"><button class="sample">情绪上来时，先停三秒，比立刻反应更有力量。</button><button class="sample">今天没有变得很厉害也没关系，愿意照顾自己就已经很好。</button><button class="sample">有些答案不是马上出现的，先让自己慢慢呼吸。</button><button class="sample">把心里的声音写下来，它就不会一直在身体里打转。</button></div></aside>
</div>
<script>
const q=document.getElementById('quoteText');
document.querySelectorAll('.sample').forEach(btn=>btn.addEventListener('click',()=>{const t=btn.textContent.trim();q.innerHTML=t.replace(/，/g,'，<br>').replace(/。$/,'。')}));
const screen=document.getElementById('screen'), soft=document.getElementById('softBtn'), dark=document.getElementById('darkBtn');
soft.onclick=()=>{screen.classList.remove('alt');soft.classList.add('active');dark.classList.remove('active')};
dark.onclick=()=>{screen.classList.add('alt');dark.classList.add('active');soft.classList.remove('active')};
</script>
</body>
</html>
